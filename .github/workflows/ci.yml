name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install client
        run: pip install -e "./client[dev]"

      - name: Install server
        run: pip install -e "./server[dev]"

      - name: Run tests
        run: pytest -v
