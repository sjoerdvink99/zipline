# Pre-commit hooks for ZipLine
# Install with: pre-commit install

repos:
  # Ruff linting and formatting (backend)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff-lint
        files: ^backend/.*\.py$
        args: [--fix, --unsafe-fixes, --cache-dir=backend/.ruff_cache]
      - id: ruff-format
        name: ruff-format
        files: ^backend/.*\.py$
        args: [--cache-dir=backend/.ruff_cache]

  # Local hooks
  - repo: local
    hooks:
      - id: backend-tests
        name: backend-tests
        entry: bash -c 'cd backend && .venv/bin/python -m pytest tests/ --tb=short -q'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend-typecheck
        entry: bash -c 'cd frontend && bun run typecheck'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-lint
        name: frontend-lint
        entry: bash -c 'cd frontend && bun run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/
      - id: end-of-file-fixer
        exclude: ^frontend/
      - id: check-yaml
        exclude: ^frontend/
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict

fail_fast: false
default_stages: [pre-commit]
